name: ci

on:
  push:
  pull_request:

jobs:
  powershell-parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $allErrors = @()
          Get-ChildItem -Path . -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors) {
              $allErrors += $parseErrors
            }
          }

          if ($allErrors.Count -gt 0) {
            $allErrors | ForEach-Object {
              Write-Error ("{0}:{1}: {2}" -f $_.Extent.File, $_.Extent.StartLineNumber, $_.Message)
            }
            exit 1
          }

          Write-Host 'PowerShell parse check passed.'
